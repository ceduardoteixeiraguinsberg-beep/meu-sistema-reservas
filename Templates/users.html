{% extends "base.html" %}
{% block content %}
<h2>Gestão de Utilizadores</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>
                <a href="{{ url_for('edit_user', id=u.id) }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="{{ url_for('delete_user', id=u.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Apagar utilizador?')">Apagar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
