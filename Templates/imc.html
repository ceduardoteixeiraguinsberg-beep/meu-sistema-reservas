<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

{% extends "base.html" %}
{% block title %}Calculadora de IMC{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Calculadora de IMC</h2>
            
            <form action="/calcular_imc" method="POST" class="shadow p-4 rounded bg-white border">
                <div class="mb-3">
                    <label class="form-label">Peso (kg):</label>
                    <input type="number" step="0.1" name="peso" class="form-control" placeholder="Ex: 75.5" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Altura (m):</label>
                    <input type="number" step="0.01" name="altura" class="form-control" placeholder="Ex: 1.75" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Calcular</button>
                
                <div class="mt-3 text-center">
                    <a href="/contactos" class="text-decoration-none">Ir para Contactos</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
