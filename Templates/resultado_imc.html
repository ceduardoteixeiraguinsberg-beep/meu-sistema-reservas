<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-lg border-0 rounded-4">
                
                <div class="card-header bg-primary text-white py-3">
                    <h3 class="mb-0">Análise do seu IMC</h3>
                </div>

                <div class="card-body p-5">
                    <p class="text-muted fw-bold">O SEU ÍNDICE É:</p>
                    <h1 class="display-1 fw-bold text-dark mb-3">{{ imc }}</h1>
                    
                    <div class="badge rounded-pill p-3 fs-5 mb-4 
                        {% if categoria == 'Peso normal' %} bg-success 
                        {% elif categoria == 'Abaixo do peso' %} bg-warning text-dark 
                        {% else %} bg-danger {% endif %}">
                        {{ categoria }}
                    </div>

                    <div class="alert alert-light border-start border-4 border-primary text-start">
                        <small class="text-muted">
                            Cálculo processado com sucesso<strong></strong>.
                        </small>
                    </div>
                </div>

                <div class="card-footer bg-white border-0 pb-4 d-grid gap-2">
                    <a href="/imc" class="btn btn-success btn-lg shadow-sm">Novo Cálculo</a>
                    <a href="/" class="btn btn-outline-secondary">Voltar ao Início</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body { background-color: #f8f9fa; }
    .card { transition: transform 0.3s; }
</style>
{% endblock %}
