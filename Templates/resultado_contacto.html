<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Recebido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .result-container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="result-container text-center">
        <h1 class="text-success mb-4">Obrigado pelo seu contacto, {{ nome }}!</h1>
        
        <div class="text-start border p-3 mb-4 rounded bg-light">
            <p><strong>Email:</strong> {{ email }}</p>
            <p><strong>Mensagem enviada:</strong></p>
            <p class="font-italic">"{{ mensagem }}"</p>
        </div>

        <p class="text-muted">A sua mensagem foi validada e recebida com sucesso. </p>
        
        <a href="/contactos" class="btn btn-primary">Voltar ao formulário</a>
        <a href="/" class="btn btn-outline-secondary">Início</a>
    </div>
</div>

</body>
</html>
