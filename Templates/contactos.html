<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

{% extends "base.html" %}

{% block title %}Contactos{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Contactos</h1>
        <a href="/imc" class="btn btn-info text-white">Ir para Calculadora IMC</a>
    </div>

    <div class="card mb-4 shadow-sm border-0 bg-light">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4"><strong>Email:</strong> teste@flask.com</div>
                <div class="col-md-4"><strong>Telefone:</strong> +351 912 345 678</div>
                <div class="col-md-4"><strong>Localização:</strong> Lisboa, Portugal</div>
            </div>
        </div>
    </div>

    <hr>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <h3 class="mb-3 text-center">Envie-nos uma mensagem</h3>
            
            <form action="/contacto/enviar" method="POST" class="bg-white p-4 border rounded shadow-sm">
                
                <div class="mb-3">
                    <label for="nome" class="form-label font-weight-bold">Nome:</label>
                    <input type="text" id="nome" name="nome" class="form-control" 
                           placeholder="Seu nome completo" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label font-weight-bold">Email:</label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="seu@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="idade" class="form-label font-weight-bold">Idade:</label>
                    <input type="number" id="idade" name="idade" class="form-control" 
                           placeholder="Ex: 25" min="0" required>
                </div>

                <div class="mb-3">
                    <label for="mensagem" class="form-label font-weight-bold">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="4" class="form-control" 
                              placeholder="Escreva aqui sua mensagem..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-sm">
                    Enviar Mensagem
                </button>
            </form>
        </div>
    </div>

    <div class="mt-4 text-center">
        <a href="/" class="btn btn-outline-secondary">Voltar ao Início</a>
    </div>
</div>
{% endblock %}
